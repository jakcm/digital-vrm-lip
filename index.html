<script type="module">

// Digital VRM LipSync — 完整实现
// ============================================================

import { VRM, VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';

// ════════════════════════════════════════════════════════════
// 1. DOM 引用
// ════════════════════════════════════════════════════════════
const $ = id => document.getElementById(id);
const viewport = $('viewport');
const loading = $('loading');
const statusEl = $('status');
const messagesEl = $('chat-messages');

let vrm = null;
let expressionManager = null;

// ════════════════════════════════════════════════════════════
// 2. Edge TTS 配置与函数（来自 digital-human 成熟实现）
// ════════════════════════════════════════════════════════════
const EDGE_TTS = {
  TRUSTED_CLIENT_TOKEN: '6A5AA1D4EAFF4E9FB37E23D68491D6F4',
  WSS_URL: 'wss://speech.platform.bing.com/consumer/speech/synthesize/readaloud/edge/v1',
  VERSION_MS_GEC: '1-142.0.3595',
};

function edgeTTSGenerateUUID() {
  return 'xxxxxxxx-xxxx-xxxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

async function edgeTTSGenerateSecMsGec(token) {
  const date = new Date();
  const ticks = Math.floor(date.getTime() / 1000) + 11644473600;
  const rounded = ticks - (ticks % 300);
  const windowsTicks = rounded * 10000000;
  const encoder = new TextEncoder();
  const hashBuffer = await crypto.subtle.digest('SHA-256', encoder.encode(`${windowsTicks}${token}`));
  return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2,'0')).join('').toUpperCase();
}

function edgeTTSCreateSSML(text, voice) {
  return `<speak version="1.0" xmlns="http://www.w3.org/2001/10/synthesis" xmlns:mstts="https://www.w3.org/2001/mstts" xml:lang="zh-CN"><voice name="${voice}"><prosody rate="0%" pitch="0Hz">${text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}</prosody></voice></speak>`;
}

function edgeTTSBuildConfig() {
  const ts = new Date().toUTCString();
  return `X-Timestamp:${ts}\r\nContent-Type:application/json; charset=utf-8\r\nPath:speech.config\r\n\r\n{"context":{"synthesis":{"audio":{"metadataoptions":{"sentenceBoundaryEnabled":false,"wordBoundaryEnabled":true},"outputFormat":"audio-24khz-48kbitrate-mono-mp3"}}}}`;
}

function edgeTTSFindAudio(arr) {
  const needle = new TextEncoder().encode('Path:audio\r\n');
  for (let i = 0; i <= arr.length - needle.length; i++) {
    let match = true;
    for (let j = 0; j < needle.length; j++) {
      if (arr[i + j] !== needle[j]) { match = false; break; }
    }
    if (match) return i + needle.length;
  }
  return -1;
}

function edgeTTSParseWordBoundary(textMsg) {
  try {
    const parts = textMsg.split('\r\n\r\n');
    if (parts.length < 2) return null;
    const json = JSON.parse(parts[parts.length - 1]);
    let item = json;
    if (Array.isArray(json.Metadata)) {
      item = json.Metadata.find(m => String(m.Type || m.type || '').toLowerCase() === 'wordboundary');
      if (!item) return null;
    }
    const eventType = String(item.Type || item.type || '').toLowerCase();
    if (eventType !== 'wordboundary') return null;
    let word, offset, duration;
    if (item.Data && item.Data.text) {
      word = item.Data.text.Text || item.Data.text.text;
      offset = item.Data.Offset || 0;
      duration = item.Data.Duration || 0;
    } else {
      word = item.Text || item.text || '';
      offset = item.Offset !== undefined ? item.Offset : (item.offset || 0);
      duration = item.Duration !== undefined ? item.Duration : (item.duration || 0);
    }
    const boundaryType = (item.Data?.text?.BoundaryType || item.boundaryType || '').toLowerCase();
    if (boundaryType === 'sentence') return null;
    if (!word || !word.trim()) return null;
    return { word: word.trim(), startMs: offset / 10000, durMs: duration / 10000 };
  } catch (e) {
    return null;
  }
}

async function edgeTTSSpeak(text) {
  const voice = 'zh-CN-XiaoxiaoNeural';
  const secMsGEC = await edgeTTSGenerateSecMsGec(EDGE_TTS.TRUSTED_CLIENT_TOKEN);
  const reqId = edgeTTSGenerateUUID();
  const url = `${EDGE_TTS.WSS_URL}?TrustedClientToken=${EDGE_TTS.TRUSTED_CLIENT_TOKEN}&Sec-MS-GEC=${secMsGEC}&Sec-MS-GEC-Version=${EDGE_TTS.VERSION_MS_GEC}&ConnectionId=${reqId}`;

  const ws = new WebSocket(url);
  const audioChunks = [];
  const boundaries = [];
  let pendingReads = 0;

  await new Promise((resolve, reject) => {
    const timeout = setTimeout(() => { ws.close(); reject(new Error('Edge TTS timeout')); }, 30000);

    ws.onopen = () => {
      ws.send(edgeTTSBuildConfig());
      ws.send(`X-RequestId:${reqId}\r\nContent-Type:application/ssml+xml\r\nX-Timestamp:${new Date().toUTCString()}\r\nPath:ssml\r\n\r\n${edgeTTSCreateSSML(text, voice)}`);
    };

    ws.onmessage = (event) => {
      if (typeof event.data === 'string') {
        if (event.data.includes('Path:turn.end')) { ws.close(); return; }
        const wb = edgeTTSParseWordBoundary(event.data);
        if (wb) boundaries.push(wb);
      } else {
        pendingReads++;
        const reader = new FileReader();
        reader.onload = () => {
          const arr = new Uint8Array(reader.result);
          const start = edgeTTSFindAudio(arr);
          if (start !== -1) audioChunks.push(arr.slice(start));
          pendingReads--;
        };
        reader.readAsArrayBuffer(event.data);
      }
    };

    ws.onerror = () => { clearTimeout(timeout); reject(new Error('Edge TTS WebSocket error')); };
    ws.onclose = () => {
      clearTimeout(timeout);
      const waitReads = () => {
        if (pendingReads > 0) setTimeout(waitReads, 10);
        else resolve();
      };
      waitReads();
    };
  });

  const total = audioChunks.reduce((a, c) => a + c.length, 0);
  const combined = new Uint8Array(total);
  let off = 0;
  for (const chunk of audioChunks) { combined.set(chunk, off); off += chunk.length; }
  if (combined.length === 0) throw new Error('No audio received from Edge TTS');
  return { audioBuffer: combined.buffer, boundaries };
}

// ════════════════════════════════════════════════════════════
// 3. Viseme → VRM BlendShape 映射
// ════════════════════════════════════════════════════════════

// digital-human visemes → VRM 标准 blendshape 映射表
const VISEME_MAP = {
  'aa': { name: 'aa', weight: 0.80 },
  'E':  { name: 'ee', weight: 0.75 },
  'I':  { name: 'ih', weight: 0.70 },
  'O':  { name: 'oh', weight: 0.75 },
  'U':  { name: 'ou', weight: 0.65 },
  'PP': { name: 'aa', weight: 0.45 },
  'FF': { name: 'aa', weight: 0.30 },
  'TH': { name: 'aa', weight: 0.40 },
  'CH': { name: 'ih', weight: 0.45 },
  'SS': { name: 'ih', weight: 0.35 },
  'DD': { name: 'aa', weight: 0.50 },
  'nn': { name: 'ih', weight: 0.45 },
  'RR': { name: 'ou', weight: 0.40 },
  'kk': { name: 'aa', weight: 0.40 },
  'sil': null, // 全部归零
};

// CJK 汉字 → 交替映射到 5 个元音，避免连续汉字同嘴形
function visemeForToken(token) {
  const s = String(token || '').toLowerCase();
  if (!s) return 'sil';
  // 中文字符：按 charCode 交替映射
  if (/^[\u4e00-\u9fff]$/.test(s)) {
    return ['aa', 'E', 'I', 'O', 'U'][s.charCodeAt(0) % 5];
  }
  // 英文辅音/元音簇
  if (/^(b|p|m)/.test(s)) return 'PP';
  if (/^(f|v)/.test(s)) return 'FF';
  if (/^th/.test(s)) return 'TH';
  if (/^(ch|sh|j)/.test(s)) return 'CH';
  if (/^(s|z|c|x)/.test(s)) return 'SS';
  if (/^(d|t|l)/.test(s)) return 'DD';
  if (/^n/.test(s)) return 'nn';
  if (/^r/.test(s)) return 'RR';
  if (/^(k|g|q)/.test(s)) return 'kk';
  if (/[a]/.test(s)) return 'aa';
  if (/[e]/.test(s)) return 'E';
  if (/[i|y]/.test(s)) return 'I';
  if (/[o]/.test(s)) return 'O';
  if (/[u|w]/.test(s)) return 'U';
  return 'aa';
}

function tokenizeForVisemes(word) {
  const tokens = [];
  const parts = String(word || '').match(/[\u4e00-\u9fff]|th|ch|sh|[a-zA-Z]+|\d/g) || [];
  for (const part of parts) {
    if (/^[a-zA-Z]+$/.test(part)) {
      const clusters = part.match(/th|ch|sh|[bcdfghjklmnpqrstvwxyz]+|[aeiouy]+/gi) || [part];
      tokens.push(...clusters);
    } else {
      tokens.push(part);
    }
  }
  return tokens.length ? tokens : [word];
}

function buildVisemeSchedule(boundaries) {
  // boundaries: [{word, startMs, durMs}, ...]
  // 返回: [{time, visemeType}] — 按时间排序的事件调度表
  // 每个 viseme 从 time 开始一直保持到下一个事件的 time
  const events = [];
  for (const b of boundaries) {
    const tokens = tokenizeForVisemes(b.word);
    const totalDur = Math.max(b.durMs || 30, tokens.length * 60);
    const slot = totalDur / Math.max(tokens.length, 1);
    tokens.forEach((token, i) => {
      const start = Math.round(b.startMs + i * slot);
      const visemeType = visemeForToken(token);
      events.push({ time: start, visemeType });
    });
  }
  if (events.length === 0) return events;
  // 排序并按时间扩展：每个 viseme 从自己的 time 一直占用到下一个的 time
  events.sort((a, b) => a.time - b.time);
  // 去重：同一时间取最后一个
  const deduped = [events[0]];
  for (let i = 1; i < events.length; i++) {
    if (events[i].time === deduped[deduped.length-1].time) {
      deduped[deduped.length-1] = events[i];
    } else {
      deduped.push(events[i]);
    }
  }
  return deduped;
}

/**
 * 拉伸 viseme 时间轴到接近音频总时长。
 * 保留相对时间比例，均匀拉伸到整个音频时长。
 * 在末尾追加一个 sil（闭嘴）事件，确保音频结束前嘴巴自然闭合。
 */
function stretchSchedule(schedule, audioDurMs) {
  if (schedule.length <= 1) return schedule;
  const rawEnd = schedule[schedule.length - 1].time;
  if (rawEnd <= 0) return schedule;
  const firstTime = schedule[0].time;
  if (rawEnd <= firstTime) return schedule;
  // 目标：口型活动占据音频的前 98%，留 2% 缓冲
  const targetSpan = audioDurMs * 0.98;
  const ratio = targetSpan / (rawEnd - firstTime);
  const stretched = schedule.map((e, i) => ({
    ...e,
    time: i === 0 ? e.time : Math.round(firstTime + (e.time - firstTime) * ratio),
  }));
  // 在音频结束前 300ms 追加闭嘴事件，让嘴巴自然闭合
  const closeTime = Math.round(audioDurMs) - 300;
  if (closeTime > (stretched[stretched.length - 1]?.time || 0)) {
    stretched.push({ time: closeTime, visemeType: 'sil' });
  }
  return stretched;
}

function buildEstimatedSchedule(text) {
  const chars = text.split('');
  const perChar = 100; // ~100ms per char baseline
  const events = chars.map((ch, i) => ({
    time: Math.round(i * perChar),
    visemeType: visemeForToken(ch),
  }));
  return events;
}

// 获取 VRM 上可用的 blendshape（兼容检查）
function getVRMMouthExpressions() {
  const em = vrm?.expressionManager;
  if (!em) return [];
  const allNames = [];
  try {
    const exprs = em.expressions;
    if (exprs) {
      if (Array.isArray(exprs)) {
        for (const e of exprs) { if (e?.expressionName) allNames.push(e.expressionName); }
      } else if (typeof exprs === 'object') {
        for (const key of Object.keys(exprs)) {
          const e = exprs[key];
          if (e?.expressionName) allNames.push(e.expressionName);
        }
      }
    }
  } catch (e) {
    console.warn('Failed to enumerate expressions:', e);
  }
  // 标准嘴型预设
  const mouthPresets = ['aa', 'ih', 'ou', 'oh', 'ee', 'JawOpen', 'a', 'i', 'u', 'e', 'o'];
  return allNames.filter(n => mouthPresets.includes(n));
}

function setMouthBlendShape(name, weight) {
  const em = vrm?.expressionManager;
  if (!em) return;
  // 先检查 expression 是否存在
  try {
    const expr = em.getExpression(name);
    if (expr) {
      em.setValue(name, weight);
    }
  } catch (e) {
    // ignore
  }
}

function resetAllMouth() {
  const names = ['aa', 'ih', 'ou', 'oh', 'ee', 'JawOpen', 'a', 'i', 'u', 'e', 'o'];
  for (const n of names) {
    setMouthBlendShape(n, 0);
  }
}

// 应用一个 viseme 到 VRM blendshape
function applyViseme(visemeType) {
  resetAllMouth();
  if (visemeType === 'sil') return;
  const mapping = VISEME_MAP[visemeType];
  if (mapping) {
    // 直接设置 VRM 标准 blendshape
    setMouthBlendShape(mapping.name, mapping.weight);
  } else {
    // 未知 viseme 类型，兜底用 aa
    setMouthBlendShape('aa', 0.5);
  }
}

// ════════════════════════════════════════════════════════════
// 4. 音频播放 + 唇形同步调度器
// ════════════════════════════════════════════════════════════

let audioCtx = null;
function getAudioContext() {
  if (!audioCtx) audioCtx = new AudioContext();
  return audioCtx;
}

let lipSyncRunning = false;
let lipSyncRAF = null;
let visemeSchedule = [];
let audioStartTime = 0;
let scheduleIndex = 0;
let speakingEndTime = 0;
let currentVisemeLate = 'sil';

function startLipSync(schedule, audioBuffer) {
  if (lipSyncRunning) stopLipSync();
  const ctx = getAudioContext();
  if (ctx.state === 'suspended') ctx.resume();

  // 创建音频源
  const source = ctx.createBufferSource();
  source.buffer = audioBuffer;
  source.connect(ctx.destination);

  // 启动
  audioStartTime = ctx.currentTime + 0.05; // 50ms 缓冲
  source.start(audioStartTime);

  visemeSchedule = schedule;
  scheduleIndex = 0;
  currentVisemeLate = 'sil';
  lipSyncRunning = true;
  isSpeaking = true;

  // 音频播放结束时自动关闭唇同步
  source.onended = () => {
    setTimeout(() => stopLipSync(), 300);
  };

  // 计算总时长
  speakingEndTime = audioStartTime + Math.max(audioBuffer.duration + 0.8,
    schedule.length > 0 ? (schedule[schedule.length-1].time + 300) / 1000 : audioBuffer.duration + 0.8);

  // 启动渲染循环
  lipSyncLoop();
}

function lipSyncLoop() {
  if (!lipSyncRunning) return;
  const ctx = getAudioContext();
  const now = ctx.currentTime;
  const elapsedMs = (now - audioStartTime) * 1000;

  if (now >= speakingEndTime) {
    stopLipSync();
    return;
  }

  // 推进到当前时间应该显示的 viseme
  let newViseme = null;
  while (scheduleIndex < visemeSchedule.length) {
    const event = visemeSchedule[scheduleIndex];
    if (elapsedMs >= event.time) {
      newViseme = event.visemeType;
      scheduleIndex++;
    } else {
      break;
    }
  }

  if (newViseme !== null) {
    currentVisemeLate = newViseme;
    applyViseme(newViseme);
  }
  // else: 保持上一个 viseme（没有空隙，不归零）

  lipSyncRAF = requestAnimationFrame(lipSyncLoop);
}

function stopLipSync() {
  lipSyncRunning = false;
  if (lipSyncRAF) { cancelAnimationFrame(lipSyncRAF); lipSyncRAF = null; }
  resetAllMouth();
  isSpeaking = false;
  currentVisemeLate = 'sil';
  scheduleIndex = 0;
  visemeSchedule = [];
  updateSendBtn();
}

// ════════════════════════════════════════════════════════════
// 5. 主说话函数
// ════════════════════════════════════════════════════════════

async function speakText(text) {
  if (!text || !text.trim() || isSpeaking) return;
  text = text.trim();
  isSpeaking = true;
  updateSendBtn();

  addMessage(text, 'user');

  try {
    // 1. Edge TTS → 获取 word boundaries + 音频
    const result = await edgeTTSSpeak(text);
    const { boundaries, audioBuffer } = result;

    // 2. word boundaries → viseme 时间表
    let schedule = [];
    if (boundaries.length > 0) {
      schedule = buildVisemeSchedule(boundaries);
    } else {
      // 没有 word boundary 时的兜底：根据文本长度估算
      schedule = buildEstimatedSchedule(text);
    }

    // 3. 解码 MP3 → AudioBuffer
    const ctx = getAudioContext();
    const audioBuf = await ctx.decodeAudioData(audioBuffer.slice(0));

    // 4. 拉伸 viseme 时间轴匹配音频时长
    const audioDurMs = audioBuf.duration * 1000;
    schedule = stretchSchedule(schedule, audioDurMs);

    // 5. 启动唇同步 + 音频播放
    startLipSync(schedule, audioBuf);
    setStatus(`说话中... ${boundaries.length} 个词边界, ${schedule.length} 个 viseme`);

  } catch (err) {
    console.warn('Edge TTS failed (headless Chrome limitation, works in real browsers):', err);
    setStatus('🔊 使用浏览器语音后备...');
    // 兜底：Speech Synthesis API + 手动估算 viseme 时间
    const ctx = getAudioContext();
    try {
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'zh-CN';
      utterance.rate = 1.1;
      utterance.pitch = 1.0;

      // 估算 viseme 时间表，用 silent buffer 时长拉伸
      const estimatedSchedule = buildEstimatedSchedule(text);
      // silent buffer 时长：每个字约 130ms，最少 1.5s
      const totalDur = Math.max(text.length * 130, 1500);
      const sr = ctx.sampleRate;
      const totalSamples = Math.round(sr * (totalDur + 500) / 1000);
      const silentBuf = ctx.createBuffer(1, totalSamples, sr);
      const stretched = stretchSchedule(estimatedSchedule, totalDur);

      // 用 silent AudioBuffer 驱动唇同步计时器
      startLipSync(stretched, silentBuf);

      // 播放浏览器语音
      utterance.onstart = () => {
        setStatus(`🔊 说话中... (${text.length}字, 浏览器语音)`);
      };
      utterance.onend = () => {
        setTimeout(() => {
          stopLipSync();
          setStatus('说话完成');
          isSpeaking = false;
          updateSendBtn();
        }, 400);
      };
      utterance.onerror = (e) => {
        console.warn('SpeechSynthesis error:', e);
        stopLipSync();
        setStatus('⚠️ 语音合成失败');
        isSpeaking = false;
        updateSendBtn();
      };

      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(utterance);

    } catch (e2) {
      console.error('Both TTS failed:', e2);
      setStatus('❌ 语音合成失败');
      isSpeaking = false;
      updateSendBtn();
    }
  }
}

// ════════════════════════════════════════════════════════════
// 6. 三种说话模式
// ════════════════════════════════════════════════════════════

// 模式 A：直接朗读文字
async function speakInputText(text) {
  await speakText(text);
}

// 模式 B：AI 对话
async function speakWithAI(text) {
  if (isWaitingAI) return;
  isWaitingAI = true;
  isSpeaking = true;
  updateSendBtn();
  setStatus('AI 思考中...');

  try {
    const apiKey = cfgApiKey.value.trim();
    if (!apiKey) {
      // 没配 API Key 就直接朗读
      isWaitingAI = false;
      isSpeaking = false;
      updateSendBtn();
      await speakText(text);
      return;
    }

    const resp = await fetch('https://openrouter.ai/api/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${apiKey}`,
        'Content-Type': 'application/json',
        'HTTP-Referer': window.location.origin,
      },
      body: JSON.stringify({
        model: 'deepseek/deepseek-v4-flash',
        messages: [
          { role: 'system', content: '你是一个有趣的数字人助手，回答简洁生动，控制在 50 字以内。' },
          { role: 'user', content: text },
        ],
        max_tokens: 128,
        stream: false,
      }),
    });

    if (!resp.ok) {
      isWaitingAI = false;
      isSpeaking = false;
      updateSendBtn();
      await speakText(text);
      return;
    }

    const data = await resp.json();
    const reply = data.choices?.[0]?.message?.content?.trim() || text;
    addMessage(reply, 'assistant');
    isWaitingAI = false;
    isSpeaking = false;
    updateSendBtn();
    await speakText(reply);
  } catch (err) {
    console.warn('AI chat failed:', err);
    isWaitingAI = false;
    isSpeaking = false;
    updateSendBtn();
    await speakText(text);
  }
}

// ════════════════════════════════════════════════════════════
// 7. Three.js VRM 场景
// ════════════════════════════════════════════════════════════

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(30, viewport.clientWidth / viewport.clientHeight, 0.1, 20);
camera.position.set(0, 1.1, 2.2);
camera.lookAt(0, 0.95, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(viewport.clientWidth, viewport.clientHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
viewport.appendChild(renderer.domElement);

// 轨道控制器（触控缩放/旋转/平移）
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0.95, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.1;
controls.minDistance = 0.5;
controls.maxDistance = 5;
controls.update();

// ════════════════════════════════════════════════════════════
// 8. 灯光
// ════════════════════════════════════════════════════════════
const ambientLight = new THREE.AmbientLight(0x404060, 0.6);
scene.add(ambientLight);

const sunLight = new THREE.DirectionalLight(0xFFEECC, 1.2);
sunLight.position.set(1, 2, 2);
sunLight.castShadow = true;
sunLight.shadow.mapSize.width = 1024;
sunLight.shadow.mapSize.height = 1024;
scene.add(sunLight);

const fillLight = new THREE.DirectionalLight(0x8888FF, 0.3);
fillLight.position.set(-1, 0.5, -1);
scene.add(fillLight);

const hemiLight = new THREE.HemisphereLight(0x87CEEB, 0x3a3a5e, 0.6);
scene.add(hemiLight);

// ════════════════════════════════════════════════════════════
// 9. 加载 VRM 模型
// ════════════════════════════════════════════════════════════

async function loadVRM(url) {
  setStatus('加载 VRM 模型中...');
  const loader = new GLTFLoader();
  loader.register(parser => new VRMLoaderPlugin(parser));

  try {
    const gltf = await new Promise((resolve, reject) => {
      loader.load(url, resolve, undefined, reject);
    });

    const loadedVrm = gltf.userData.vrm;
    vrm = loadedVrm;

    // 获取 expression manager
    if (vrm.expressionManager) {
      expressionManager = vrm.expressionManager;
      availableExpressions = getVRMMouthExpressions();
      setStatus(`VRM 加载完成 | ${availableExpressions.join(', ') || '未检测到 blendshape'}`);
      console.log('VRM loaded, available expressions:', availableExpressions);
    } else {
      setStatus('⚠️ VRM 无 ExpressionManager');
    }

    // 添加到场景
    scene.add(vrm.scene);

    // 缩放和位置
    vrm.scene.scale.set(1, 1, 1);
    vrm.scene.position.y = 0;
    vrm.scene.rotation.y = Math.PI; // 旋转面向相机

    // 启用阴影
    vrm.scene.traverse(obj => {
      if (obj.isMesh) {
        obj.castShadow = true;
        obj.receiveShadow = true;
      }
    });

    // 尝试加载 idle 动画 (optional)
    try {
      const vrmaUrl = url.replace('.vrm', '_idle.vrma');
      const vrmaResp = await fetch(vrmaUrl, { method: 'HEAD' });
      if (vrmaResp.ok) {
        // 有 idle 动画文件，但简化处理就不加载了
      }
    } catch (e) {}

    loading.classList.add('done');
    setTimeout(() => loading.style.display = 'none', 600);

    return vrm;
  } catch (err) {
    setStatus(`❌ VRM 加载失败: ${err.message}`);
    loading.innerHTML = `
      <div style="color:#ff6b6b;font-size:40px">⚠️</div>
      <div style="color:#aaa">VRM 加载失败</div>
      <div style="color:#666;font-size:13px;max-width:300px;text-align:center">${err.message}</div>
    `;
    throw err;
  }
}

// 加载默认 VRM
const defaultVRMUrl = cfgVrmUrl.value || './default.vrm';
loadVRM(defaultVRMUrl);

// ════════════════════════════════════════════════════════════
// 10. 渲染循环
// ════════════════════════════════════════════════════════════

function animate() {
  requestAnimationFrame(animate);

  // 更新轨道控制器
  controls.update();

  // 更新 VRM
  if (vrm) {
    vrm.update(performance.now() / 1000);
  }

  renderer.render(scene, camera);
}
animate();

// ════════════════════════════════════════════════════════════
// 11. 窗口尺寸自适应
// ════════════════════════════════════════════════════════════

function onResize() {
  const w = viewport.clientWidth;
  const h = viewport.clientHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
}
window.addEventListener('resize', onResize);
new ResizeObserver(onResize).observe(viewport);

// ════════════════════════════════════════════════════════════
// 12. UI 事件
// ════════════════════════════════════════════════════════════

function addMessage(text, role) {
  const el = document.createElement('div');
  el.className = 'msg ' + role;
  el.textContent = text;
  messagesEl.appendChild(el);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function setStatus(text) {
  statusEl.textContent = text;
}

function updateSendBtn() {
  sendBtn.disabled = isSpeaking || isWaitingAI;
  sendBtn.textContent = isWaitingAI ? '思考中...' : isSpeaking ? '说话中...' : '发送';
}

sendBtn.addEventListener('click', () => {
  const text = textInput.value.trim();
  if (!text || isSpeaking || isWaitingAI) return;
  textInput.value = '';
  speakWithAI(text);
});

textInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendBtn.click();
  }
});

settingsBtn.addEventListener('click', () => {
  settingsPanel.classList.toggle('open');
});

// 设置面板关闭（点击外部）
document.addEventListener('click', (e) => {
  if (!settingsPanel.contains(e.target) && e.target !== settingsBtn) {
    settingsPanel.classList.remove('open');
  }
});

// VRM URL 变更时重新加载
cfgVrmUrl.addEventListener('change', () => {
  if (vrm) {
    scene.remove(vrm.scene);
    VRMUtils.deepDispose(vrm.scene);
    vrm = null;
    expressionManager = null;
  }
  loadVRM(cfgVrmUrl.value || './default.vrm');
});

// 调试按钮：循环显示所有嘴型
const $debugBtn = $('debug-lipsync-btn');
if ($debugBtn) {
  $debugBtn.addEventListener('click', async () => {
    if (!vrm || !expressionManager) return;
    const presets = getVRMMouthExpressions();
    if (presets.length === 0) return;
    $debugBtn.textContent = '🎭 测试中...';
    $debugBtn.disabled = true;
    for (let round = 0; round < 2; round++) {
      for (const preset of presets) {
        setMouthBlendShape(preset, 0.8);
        setStatus(`🔬 测试嘴型: ${preset}=0.80`);
        await new Promise(r => setTimeout(r, 400));
        setMouthBlendShape(preset, 0);
        await new Promise(r => setTimeout(r, 150));
      }
    }
    resetAllMouth();
    setStatus('✅ 唇形同步测试完成');
    $debugBtn.textContent = '🎭 测试唇形同步（循环显示所有嘴型）';
    $debugBtn.disabled = false;
  });
}

// ════════════════════════════════════════════════════════════
// 13. 初始化完成
// ════════════════════════════════════════════════════════════

setStatus('初始化完成 | 输入文字后发送');

console.log('🤖 Digital VRM LipSync initialized');
console.log('📢 架构：Edge TTS word boundary → 定时 viseme 队列 → VRM BlendShape');
console.log('💡 Edge TTS 完全免费，无需 API Key');
console.log('🔑 如需 AI 对话，在设置中填入 OpenRouter API Key');

// ════════════════════════════════════════════════════════════════════════════
// 导出到 window 供调试
// ════════════════════════════════════════════════════════════════════════════
window.__debug = {
  speakText,
  stopLipSync,
  vrm: () => vrm,
  expressions: () => getVRMMouthExpressions(),
  applyViseme,
  resetAllMouth,
};

</script>
